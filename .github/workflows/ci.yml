name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # CHECKOUT
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necesario para push

      # ============================================================
      # PYTHON SETUP
      # ============================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ============================================================
      # CACHE
      # ============================================================
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      # ============================================================
      # INSTALL
      # ============================================================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage ruff

      # ============================================================
      # LINT
      # ============================================================
      - name: Run Ruff (lint)
        run: |
          ruff check .

      # ============================================================
      # TESTS + COVERAGE
      # ============================================================
      - name: Run tests with coverage
        run: |
          coverage run -m pytest
          coverage report
          coverage xml

      # ============================================================
      # COVERAGE BADGE (FIX)
      # ============================================================
      - name: Install coverage-badge dependencies
        run: |
          pip install coverage-badge setuptools
          
      - name: Generate coverage badge
        run: |
          coverage-badge -o coverage.svg -f

      # ============================================================
      # AUTO-COMMIT COVERAGE BADGE
      # ============================================================
      - name: Commit coverage badge
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "actions@github.com"
          git add coverage.svg
          git diff --cached --quiet || git commit -m "Update coverage badge [CI]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      # GENERACIÓN DE RESULTADOS (OPCIONAL)
      # ============================================================
      - name: Run main script (generate outputs)
        run: |
          python main.py || echo "main.py no genera figuras en CI"

      # ============================================================
      # ARTIFACTS - FIGURES
      # ============================================================
      - name: Upload figures
        uses: actions/upload-artifact@v4
        with:
          name: figures
          path: reports/figures/

      # ============================================================
      # ARTIFACTS - COVERAGE
      # ============================================================
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            .coverage
