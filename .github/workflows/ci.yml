name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # CHECKOUT
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================================
      # PYTHON
      # ============================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ============================================================
      # CACHE
      # ============================================================
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      # ============================================================
      # INSTALL
      # ============================================================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage ruff genbadge

      # ============================================================
      # LINT
      # ============================================================
      - name: Run Ruff
        run: |
          ruff check .

      # ============================================================
      # TESTS + COVERAGE
      # ============================================================
      - name: Run tests with coverage
        run: |
          coverage run -m pytest
          coverage report
          coverage xml -o coverage.xml

      # ============================================================
      # COVERAGE BADGE (GENBADGE)
      # ============================================================
      - name: Generate coverage badge
        run: |
          genbadge coverage -i coverage.xml -o coverage.svg

      # ============================================================
      # AUTO-COMMIT COVERAGE BADGE
      # ============================================================
      - name: Commit coverage badge
        if: github.event_name == 'push'
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "actions@github.com"
          git add coverage.svg
          git diff --cached --quiet || git commit -m "Update coverage badge [CI]"
          git push

      # ============================================================
      # GENERAR RESULTADOS / FIGURAS
      # ============================================================
      - name: Run main script
        run: |
          python main.py || echo "main.py no genera figuras en CI"

      # ============================================================
      # ARTIFACTS - FIGURES
      # ============================================================
      - name: Upload figures
        uses: actions/upload-artifact@v4
        with:
          name: figures
          path: reports/figures/
          if-no-files-found: ignore

      # ============================================================
      # ARTIFACTS - COVERAGE
      # ============================================================
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            .coverage
            coverage.svg
          if-no-files-found: ignore
